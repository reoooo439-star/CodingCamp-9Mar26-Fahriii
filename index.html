<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="time-display">
                <div id="time" class="time"></div>
                <div id="date" class="date"></div>
                <button id="themeToggle" class="theme-toggle" title="Toggle theme">🌙</button>
            </div>
        </header>

        <main>
            <section class="todo-section">
                <div class="section-header">
                    <h2>Today's Tasks</h2>
                    <select id="sortSelect" class="sort-select">
                        <option value="default">Sort: Default</option>
                        <option value="alphabetical">Sort: A-Z</option>
                        <option value="completed">Sort: Completed Last</option>
                    </select>
                </div>
                <div class="add-task">
                    <input type="text" id="taskInput" placeholder="Add a new task..." />
                    <button id="addBtn">Add</button>
                </div>
                <ul id="taskList" class="task-list"></ul>
            </section>

            <section class="timer-section">
                <h2>Focus Timer</h2>
                <div class="timer-presets">
                    <button class="preset-btn" data-minutes="15">15m</button>
                    <button class="preset-btn active" data-minutes="25">25m</button>
                    <button class="preset-btn" data-minutes="45">45m</button>
                    <button class="preset-btn" data-minutes="60">60m</button>
                </div>
                <div class="timer-display" id="timerDisplay">25:00</div>
                <div class="timer-controls">
                    <button id="startBtn">Start</button>
                    <button id="pauseBtn">Pause</button>
                    <button id="resetBtn">Reset</button>
                </div>
            </section>

            <section class="links-section">
                <h2>Quick Links</h2>
                <div class="add-link">
                    <input type="text" id="linkNameInput" placeholder="Link name..." />
                    <input type="url" id="linkUrlInput" placeholder="https://example.com" />
                    <button id="addLinkBtn">Add</button>
                </div>
                <div class="links-grid" id="linksGrid"></div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
